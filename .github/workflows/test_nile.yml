name: test_nile

on: pull_request

env:
  CAIRO_COMPILER_MANIFEST: /cairo/Cargo.toml

jobs:
  test_nile:
    name: test_nile
    runs-on: ubuntu-latest
    steps:
      - name: Check out main branch
        uses: actions/checkout@v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install Cairo
        uses: ./.github/actions/install_cairo

      - name: Install nile-rs
        run: cargo install --git https://github.com/OpenZeppelin/nile-rs --profile release

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - uses: actions/cache@v3
        with:
          id: py-cache
          path: ${{ env.pythonLocation }}
          key: ${{ env.pythonLocation }}

      - name: Install starknet-devnet
        if: steps.py-cache.outputs.cache-hit != 'true'
        run: pip3 install starknet-devnet==v0.5.0a1

      - name: Run Nile test script
        run: nile-rs run example
        timeout-minutes: 5
      